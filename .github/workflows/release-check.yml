name: Release Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-dist
        run: cargo install cargo-dist --version 0.28.0 --locked

      - name: Validate cargo-dist plan
        run: dist plan
