name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: odk
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: odk
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: odk
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: odk
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: odk.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cargo-dist
        run: cargo install cargo-dist --locked

      - name: Build with cargo-dist
        run: cargo dist build --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/package/
          tar -C dist/package -czf "dist/odk-${{ matrix.target }}.tar.gz" "${{ matrix.binary }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/package/
          Compress-Archive -Path "dist/package/${{ matrix.binary }}" -DestinationPath "dist/odk-${{ matrix.target }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: odk-${{ matrix.target }}
          path: dist/odk-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
